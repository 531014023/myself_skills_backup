        <h1 class="firsttitle">第七章　哲学与人生：回归本源</h1>

        <p class="content">段永平带有一种自然而然的人格魅力，只要和他接触一段时间，人们就容易被他身上的特质所影响。这种人格魅力与他对待生活、对待工作的态度有关，或者说同他的哲学思维有关。作为一个企业家、一个投资人，段永平的神秘之处在于他总是能够以一种哲学思维来经营自己的生活和事业，并且达到了一种很高的水平。</p>
