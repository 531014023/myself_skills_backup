        <h1 class="firsttitle">第一章　生活就是最好的历练</h1>

        <p class="content">一个人性格特质的形成与他的成长经历有关，只有了解了此人的生活轨迹，才能对他有一个更清晰的认识。作为20世纪60年代出生的人，段永平身上有着鲜明的时代印记，但他又不同于那个时代的其他人，他每走一步，每进入一个成长阶段，都有自己独特的想法，从上大学，到工作，再到辞职继续深造，之后选择南下……他的选择既循着时代发展的方向，又超越了环境的约束。他是少数能够保持清醒的人，知道什么才是适合自己的，知道自己想要什么，以及如何实现这些目标。</p>
