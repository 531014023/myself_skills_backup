        <h1 class="firsttitle">第二章　理想主义者的成功和失败</h1>

        <p class="content">段永平是一个理想主义者。他有着那个年代创业者、企业家的雄心和抱负，对自己的未来有着明确的规划，和那个年代众多的创业者一样，既获得了很好的发展机会，在敢闯敢干的思想潮流中，打造了属于自己的事业，同时也不得不因为一些现实问题陷入挣扎。在岁月的激荡中，段永平的理想在现实环境面前遭受了多重打击。成功和失败，理想和现实，进或退，取或舍，成为那个时代的一个基本旋律，有的人在时代浪潮中选择了妥协，有的人则选择了坚守。选择的不同，造就了不同的人生。</p>
