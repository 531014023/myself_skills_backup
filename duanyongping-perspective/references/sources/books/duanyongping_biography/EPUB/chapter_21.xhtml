        <h1 class="firsttitle">第四章　英雄的退幕和角色的转换</h1>

        <p class="content">创办步步高是段永平事业上的第二次高峰。相对于第一次事业高峰，段永平在步步高公司拥有绝对的话语权，拥有自己的经营管理体系和属于自己的团队，更重要的是，步步高步入巅峰之后，仍旧拥有巨大的发展空间。从年龄上来说，当时段永平刚刚进入创业的黄金年龄阶段。然而，就在这个时候，段永平做出了一个惊人的决定：将步步高一分为三，并且自己离开步步高。对于一个企业家而言，做出上述两个决定中的任何一个都是艰难的，毕竟谁也不愿意将自己一手创办的公司就这样轻轻地放下，但段永平很洒脱，而且在离开公司后很快就实现了角色的转换，开启了人生精彩的下半程。</p>
