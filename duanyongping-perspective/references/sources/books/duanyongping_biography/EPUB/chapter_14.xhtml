        <h1 class="firsttitle">第三章　风云再起，步步高集团下金蛋</h1>

        <p class="content">很多人以为，优秀的人往往需要一个优秀的平台来证明自己的能力，一旦离开了那个平台，个人能力和机会就会大打折扣。但事实上，真正优秀的人，即便换一个平台，照样可以做得很出色，因为他们本身就具备打造一个优秀平台的能力。段永平就是这样的人，离开小霸王的时候，他只是失去了一个好的平台，并没有失去个人能力、失去立足的根本。当所有人都在为段永平离开小霸王而感到惋惜时，他转身就创办了步步高，并依靠步步高这个品牌让自己迈上了新的台阶。</p>
